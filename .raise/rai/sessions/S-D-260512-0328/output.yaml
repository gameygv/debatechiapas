narrative: |
  ## Decisiones
  - Fork de MoyMontesBlog como base (no greenfield) — acelera el time-to-market
  - Supabase self-hosted en supabase.poesis.net (VPS dedicado, no easypanel)
  - Dominio debatechiapas.dockerapps.top en Vercel, Supabase API en debatechiapas.supabase.poesis.net
  - Credenciales generadas fresh (JWT, ANON_KEY, SERVICE_ROLE_KEY, passwords) — no reutilizar de moymontes

  ## Infraestructura creada
  - GitHub: gameygv/debatechiapas (público)
  - Cloudflare: CNAME debatechiapas.dockerapps.top → cname.vercel-dns.com (zona dockerapps.top)
  - BIND/DA: A record debatechiapas.supabase.poesis.net → 23.189.168.140 (/var/named/poesis.net.db en da-poesis)
  - Supabase: /opt/supabase/debatechiapas/ con docker-compose, .env, kong.yml, volumes/
  - Vercel: proyecto debatechiapas linkeado a GitHub, dominio custom, auto-deploy

  ## Artefactos
  - /opt/supabase/debatechiapas/.env — credenciales del stack
  - /opt/supabase/debatechiapas/volumes/kong/kong.yml — API gateway config
  - governance/ — 6 documentos (vision, prd, guardrails, backlog, system-context, system-design)
  - .raise/ — RaiSE inicializado con 192 conceptos en graph

  ## Estado del Branch
  - Branch: main, 2 commits, sincronizado con origin
  - Commit 1: eb5a562 — proyecto inicial
  - Commit 2: f2443fb — RaiSE onboarding + governance + rebranding
