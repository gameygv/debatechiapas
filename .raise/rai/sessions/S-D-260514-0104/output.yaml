narrative: |
  ## Decisiones
  - Visor PDF: iframe nativo vs pdfjs flipbook 3D — optamos por iframe después de que pdfjs no cargaba PDFs de 24 páginas
  - Header: rediseñado completamente para igualar el WP original (logo rojo full-width, barra búsqueda, nav compacta)
  - Cards: estilo similar al WP original (imagen portrait 3/4, título, categoría verde, "Leer más" rojo)
  - Redirect /{slug}: componente inteligente que consulta daily_editions para detectar ediciones vs artículos
  - Usuarios auth: creación via GoTrue admin API (INSERT directo en auth.users falla por campos NULL)
  - Dominio: DNS cambiado en hostingwarlock PowerDNS (A record 64.20.41.54 → 76.76.21.21)

  ## Infraestructura
  - Supabase: 10 tablas, 2 funciones, 22 RLS policies, bucket media (52MB limit)
  - Vercel: dominio debatechiapas.com + debatechiapas.dockerapps.top (legacy)
  - DNS: A record en hostingwarlock apuntando a Vercel (76.76.21.21)
  - Edge functions: 12 funciones en main/index.ts monolítico

  ## Artefactos
  - scripts/schema.sql — schema completo de la BD
  - scripts/migrate-wp.mjs — script de migración WordPress → Supabase
  - src/components/DailyEdition.tsx — sección homepage edición del día
  - src/pages/EditionViewer.tsx — visor PDF con iframe
  - src/pages/EditionArchive.tsx — archivo de ediciones
  - src/pages/admin/DailyEditions.tsx — admin CRUD ediciones
  - tests/exhaustive-review.spec.ts — suite de tests Playwright
  - playwright.config.ts — configuración Playwright

  ## Datos migrados
  - 2,605 artículos publicados (ene-may 2026)
  - 104 ediciones diarias con PDFs
  - 1 categoría (General)
  - Todas las imágenes copiadas a Supabase Storage

  ## Branch State
  - Branch: main, 10 commits en esta sesión
  - Último commit: 971de19 (test: revisión exhaustiva)
