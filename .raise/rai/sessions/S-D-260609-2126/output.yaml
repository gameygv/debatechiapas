narrative: |
  ## Contexto
  Ataque DDoS ayer afectó múltiples servidores. Durante la remediación en d:/github/servers, se hicieron cambios que rompieron debatechiapas.com.

  ## Problema 1: DNS apuntando a WordPress viejo
  - debatechiapas.com resolvía a 64.20.41.54 (cpanel-hw, WordPress viejo)
  - Descubrí que los NS del registrar (ns1/ns2.hostingwarlock.com) apuntan a cpanel-hw, NO a da-poesis
  - Edité la zona en cpanel-hw (/var/named/debatechiapas.com.db): A record 64.20.41.54 → 76.76.21.61, www CNAME → cname.vercel-dns.com
  - PowerDNS reiniciado, propagación confirmada

  ## Problema 2: URL de Supabase cambiada
  - Commit e30196a cambió client.ts de debatechiapas.supabase.poesis.net a supabase-api.hostingwarlock.com
  - supabase-api.hostingwarlock.com apunta al server correcto pero Kong no rutea ese dominio al stack de debatechiapas
  - Revertido en commit 00ac76a, redesplegado en Vercel

  ## Problema 3: Imágenes rotas
  - 109 registros en DB tenían URLs con supabase-api.hostingwarlock.com
  - Corregidos via UPDATE con REPLACE en: articles, daily_editions, media_files

  ## Problema 4: supabase-poesis temporalmente caído
  - Server 23.189.168.140 no respondía (consecuencia del DDoS)
  - Se recuperó solo — contenedores reiniciaron automáticamente

  ## Mejora: Verificación Make.com API (punto 5)
  - Nuevo status 'sent' añadido a social_queue CHECK constraint
  - Phase 1: verifica items 'sent' contra GET /api/v2/scenarios/4533733/logs
  - Phase 2: dosificación (15 min)
  - Phase 3: enviar pendiente, marcar 'sent'
  - Solo marca 'published' cuando Make.com confirma status=1
  - Reactivación automática de escenario si webhook retorna 422/400
  - Badge azul "Verificando" en admin

  ## Archivos modificados
  - src/integrations/supabase/client.ts — URL de Supabase corregida
  - src/pages/admin/Articles.tsx — badge para status 'sent'
  - supabase/functions/process-social-queue/index.ts — documentación del flujo
  - /opt/supabase/debatechiapas/volumes/functions/main/index.ts (server) — lógica de 3 fases
  - /var/named/debatechiapas.com.db (cpanel-hw) — zona DNS corregida
  - /var/named/debatechiapas.com.db (da-poesis) — zona DNS corregida (backup)

  ## Commits
  - 00ac76a fix: restaurar URL de Supabase correcta
  - 970950b feat: verificación de publicación social via Make.com API
